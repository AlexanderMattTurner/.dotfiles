name: Idempotency

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Read-only smoke job: it never pushes, so drop the token to contents:read
# (every other workflow in this repo scopes GITHUB_TOKEN explicitly).
permissions:
  contents: read

# Read-only checks, but push+pull_request double-triggers make overlapping
# runs on the same ref routine waste — newest run wins.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Verifies setup.bash --link-only is safely re-runnable. Running it twice in
# an isolated $HOME must produce identical symlink sets and zero "Skipping"
# / "Overwrite?" / "backed up to" output on the second pass. doctor.bash is
# then asked to verify only the symlink section (other checks need
# brew/fish, which we deliberately don't install in this fast smoke job).
#
# Runs on Ubuntu and macOS so the `if [ "$(uname)" = "Darwin" ]` branches
# in setup.bash — aerospace + iTerm2 plist symlinks under ~/Library — are
# also exercised.

jobs:
  link-only-idempotent:
    name: setup.bash --link-only is idempotent (${{ matrix.os }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Read-only job — don't leave the checkout token usable by later steps.
          persist-credentials: false

      - name: Clone claude-guard (pinned)
        # Checks out the commit in claude-guard.ref so the symlink set under
        # test matches what setup.bash installs.
        run: bash bin/clone-claude-guard.bash

      - name: Run idempotency check
        env:
          # Scratch dirs under $RUNNER_TEMP keep the workflow's own log/listing
          # files out of the repo workspace, so the script's porcelain check
          # sees only what setup.bash itself wrote.
          TEST_HOME: ${{ runner.temp }}/fakehome
          SCRATCH: ${{ runner.temp }}/idempotency
        run: bash bin/check-idempotency.bash

      - name: Doctor reports symlinks healthy
        # Tolerate FAILs from "Required commands" / "Brewfile" / "tmux"
        # (brew/fish/nvim/zoxide aren't fully installed in this minimal job)
        # but every Symlinks check must PASS.
        env:
          HOME: ${{ runner.temp }}/fakehome
        run: bash bin/check-doctor-symlinks.bash
